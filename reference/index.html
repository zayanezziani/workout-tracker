<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bench Press - Workout Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone-frame">
    <!-- Background Image -->
    <div class="bg-image">
      <img src="https://www.figma.com/api/mcp/asset/d058721f-cb84-4143-80f0-ce209f9ab74d" alt="Exercise background">
    </div>

    <!-- Gradient Overlays -->
    <div class="overlay-bottom"></div>
    <div class="overlay-top"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <img src="https://www.figma.com/api/mcp/asset/aa02a516-8daf-40d3-9de7-fb9d663da6fe" alt="Signal" class="status-icon cellular">
        <img src="https://www.figma.com/api/mcp/asset/67f6be8c-3910-4182-9089-b18968fee01a" alt="WiFi" class="status-icon wifi">
        <img src="https://www.figma.com/api/mcp/asset/dad98d44-4af5-4124-8580-71a9f7eea601" alt="Battery" class="status-icon battery">
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Header -->
      <div class="header">
        <button class="icon-btn" aria-label="Go back">
          <img src="https://www.figma.com/api/mcp/asset/c0a5cb3d-c212-4219-84ca-e797191adbf9" alt="Back">
        </button>
        <h1 class="title">Bench Press</h1>
        <button class="icon-btn" aria-label="Menu">
          <img src="https://www.figma.com/api/mcp/asset/d72611dc-c6b7-4f67-9116-d334f0800348" alt="Menu">
        </button>
      </div>

      <!-- Spacer -->
      <div class="spacer"></div>

      <!-- Reps Counter -->
      <div class="reps-section">
        <div class="reps-counter">
          <span class="reps-number">8</span>
          <span class="reps-label">Reps</span>
        </div>

        <!-- Set Selector -->
        <div class="set-selector">
          <div class="set-pill set-pill--active">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M1 6L6 11L15 1" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="set-pill set-pill--inactive">Set 3</div>
          <div class="set-pill set-pill--inactive">Set 3</div>
        </div>
      </div>

      <!-- Bottom Actions -->
      <div class="bottom-actions">
        <button class="action-btn action-btn--glass" aria-label="List">
          <img src="https://www.figma.com/api/mcp/asset/d72611dc-c6b7-4f67-9116-d334f0800348" alt="List">
        </button>
        <button class="next-set-btn">Next Set</button>
        <button class="action-btn action-btn--glass" aria-label="Share">
          <img src="https://www.figma.com/api/mcp/asset/b482afa4-1f13-40ac-a5d4-a8444fccf27f" alt="Share">
        </button>
      </div>
    </div>
  </div>
</body>
</html>
