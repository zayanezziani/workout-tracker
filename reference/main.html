<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout - Chest & Triceps Day</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <div class="phone-frame">
    <!-- Background -->
    <div class="main-bg"></div>
    <div class="main-bg-glow"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <img src="https://www.figma.com/api/mcp/asset/e616d50b-6608-4995-8a3e-701718088768" alt="Signal" class="status-icon cellular">
        <img src="https://www.figma.com/api/mcp/asset/6ff12d8f-4b7d-42e3-acd7-877f4131c590" alt="WiFi" class="status-icon wifi">
        <img src="https://www.figma.com/api/mcp/asset/81cf15a6-dc86-45ed-9ff3-6c6632e028dd" alt="Battery" class="status-icon battery">
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Welcome Header -->
      <div class="welcome-header">
        <p class="welcome-date">Sunday, March 8</p>
        <div class="welcome-title-row">
          <h1 class="welcome-title">It's Chest & Triceps Day</h1>
          <button class="chevron-btn" aria-label="Change workout">
            <img src="https://www.figma.com/api/mcp/asset/bcfbec62-1fcb-45b5-8440-6220ed0b6b4d" alt="Expand">
          </button>
        </div>
        <div class="welcome-meta">
          <span class="meta-pill">
            <img src="https://www.figma.com/api/mcp/asset/e0bab622-0fe7-42ce-a4dc-52185b37e1c0" alt="Clock" class="meta-icon">
            ~30 min
          </span>
          <span class="meta-pill">
            <img src="https://www.figma.com/api/mcp/asset/a157cf10-9e48-4dba-b7ad-65e65fe58eab" alt="Exercises" class="meta-icon">
            4 exercises
          </span>
        </div>
      </div>

      <!-- Exercise List -->
      <div class="exercise-list">
        <a href="index.html" class="exercise-card">
          <div class="exercise-thumb">
            <img src="https://www.figma.com/api/mcp/asset/963df587-5a16-4844-b2cc-868e32c18f8b" alt="Push-Ups">
          </div>
          <div class="exercise-info">
            <span class="exercise-name">Push-Ups</span>
            <span class="exercise-detail">3 sets &middot; 12 reps</span>
          </div>
          <div class="exercise-check">
            <img src="https://www.figma.com/api/mcp/asset/a644991d-4d35-4ebc-988b-1c61bcbe8c85" alt="Status">
          </div>
        </a>

        <a href="index.html" class="exercise-card">
          <div class="exercise-thumb">
            <img src="https://www.figma.com/api/mcp/asset/426f5511-cd21-4994-ba5a-e484789c3716" alt="Tricep Dips">
          </div>
          <div class="exercise-info">
            <span class="exercise-name">Tricep Dips</span>
            <span class="exercise-detail">3 sets &middot; 12 reps</span>
          </div>
          <div class="exercise-check">
            <img src="https://www.figma.com/api/mcp/asset/a644991d-4d35-4ebc-988b-1c61bcbe8c85" alt="Status">
          </div>
        </a>

        <a href="index.html" class="exercise-card">
          <div class="exercise-thumb">
            <img src="https://www.figma.com/api/mcp/asset/197ebad6-f9cc-4f0a-ac64-60cd2cb5050c" alt="Bench Press">
          </div>
          <div class="exercise-info">
            <span class="exercise-name">Bench Press</span>
            <span class="exercise-detail">3 sets &middot; 12 reps</span>
          </div>
          <div class="exercise-check">
            <img src="https://www.figma.com/api/mcp/asset/a644991d-4d35-4ebc-988b-1c61bcbe8c85" alt="Status">
          </div>
        </a>

        <a href="index.html" class="exercise-card">
          <div class="exercise-thumb">
            <img src="https://www.figma.com/api/mcp/asset/cc0f9571-9b0d-4862-9554-b5c21323ce85" alt="Dumbbell Flyes">
          </div>
          <div class="exercise-info">
            <span class="exercise-name">Dumbbell Flyes</span>
            <span class="exercise-detail">3 sets &middot; 12 reps</span>
          </div>
          <div class="exercise-check">
            <img src="https://www.figma.com/api/mcp/asset/a644991d-4d35-4ebc-988b-1c61bcbe8c85" alt="Status">
          </div>
        </a>
      </div>

      <!-- Start Button -->
      <div class="start-section">
        <button class="start-btn" onclick="window.location.href='index.html'">Start Workout</button>
      </div>
    </div>
  </div>
</body>
</html>
